name: Bank Status Scraper

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes
  workflow_dispatch:  # Allows manual triggering from the GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Ensure scraper-specific libraries are present in case they are missing from requirements
        pip install selenium webdriver-manager supabase python-dotenv pandas

    - name: Run Scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python src/bank_monitor.py

    - name: Upload Error Screenshot
      if: failure() || success()
      uses: actions/upload-artifact@v4
      with:
        name: error-screenshot
        path: data/error_screenshot.png
        retention-days: 1
